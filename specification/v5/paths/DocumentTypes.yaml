get:
  summary: GET /documents/documenttypes
  operationId: listDocumentTypesWithSubtypes
  description: |
    Retrieve all available document types and configured document subtypes.

    note:
    - This endpoint should be implemented by the component, so that the DMS can retrieve available types and subtypes. (flow-10)
    - Document subtypes are configurable by the school and should be treated as dynamic values.
  security:
    - bearerAuth: []
  tags:
    - documents

  responses:
    '200':
      description: List of document types with corresponding subtypes.
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
                - documentType
                - documentSubTypes
              properties:
                documentType:
                  type: string
                  description: Functional document category.
                  example: enrollment
                documentSubTypes:
                  type: array
                  description: School-defined subtypes for the document type.
                  items:
                    type: object
                    properties:
                      subtypeCode:
                        type: string
                        description: Subtype code defined by the school.
                      subtypeDescription:
                        type: string
                        description: Subtype description defined by the school.
                  example:
                    - subtypeCode: vrstlanvg
                      subtypeDescription: Vrijstellingsaanvraag
                    - subtypeCode: anmeld
                      subtypeDescription: Aanmelding
          example:
            - documentType: enrollment
              documentSubTypes:
                - subtypeCode: vrstlanvg
                  subtypeDescription: Vrijstellingsaanvraag
                - subtypeCode: anmeld
                  subtypeDescription: Aanmelding
            - documentType: examination
              documentSubTypes:
                - subtypeCode: toetsresultaat
                  subtypeDescription: Toetsresultaat
                - subtypeCode: toetsverslag
                  subtypeDescription: Toetsverslag
            - documentType: bpv
              documentSubTypes:
                - subtypeCode: poc
                  subtypeDescription: POC
                - subtypeCode: bedrijfsinformatie
                  subtypeDescription: Bedrijfs Informatie
            - documentType: graduation
              documentSubTypes:
                - subtypeCode: diplomavoorkant
                  subtypeDescription: Diploma voorkant
                - subtypeCode: diplomafoto
                  subtypeDescription: Diploma foto
    '400':
      $ref: '../schemas/ErrorBadRequest.yaml'
    '401':
      $ref: '../schemas/ErrorUnauthorized.yaml'
    '403':
      $ref: '../schemas/ErrorForbidden.yaml'
    '404':
      $ref: '../schemas/ErrorNotFound.yaml'
    '405':
      $ref: '../schemas/ErrorMethodNotAllowed.yaml'
    '429':
      $ref: '../schemas/ErrorTooManyRequests.yaml'
    '500':
      $ref: '../schemas/ErrorInternalServerError.yaml'